<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacarat Tweaks</title>
    <link rel="stylesheet" href="../style/style.css">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
        }

        #menu {
            width: 85%;
            height: 100%;
            background: #313131;
            border-radius: 30px;
            display: flex;
            flex-direction: row;
            border: 4px solid #1f1f1f;
            max-height: 400px;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: #1c1c1e;
            border-right: 1px solid rgba(255, 255, 255, .08);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 8px;
            box-sizing: border-box;
            z-index: 2;
        }

        .sidebar-item {
            padding: 13px 18px;
            color: #b8b8b8;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
            font-size: 15px;
            font-weight: 550;
            border-radius: 16px;
            cursor: pointer;
            transition: all .25s cubic-bezier(.4, 0, .2, 1);
        }

        .sidebar-item:hover {
            background: #2c2c2e;
            color: white;
        }

        .sidebar-item.active {
            background: #2c2c2e;
            color: white;
        }

        .content-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
        }

        .tab-content {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 28px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes premiumBlurIn {
            0% {
                opacity: 0;
                transform: scale(0.96) translateY(15px);
                filter: blur(4px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }

        .tab-content.active h3 {
            opacity: 0;
            animation: premiumBlurIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .tab-content.active .setting-group {
            opacity: 0;
            animation: premiumBlurIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.07s;
        }

        .setting-group {
            margin-bottom: 28px;
        }

        .setting-label {
            display: block;
            margin-bottom: 10px;
            color: #b8b8b8;
            font-size: 14px;
            font-weight: 550;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
        }

        .custom-select {
            width: 100%;
            max-width: 320px;
            padding: 14px 18px;
            background: #1c1c1e;
            color: white;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 18px;
            outline: none;
            font-size: 14px;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
            transition: all .25s cubic-bezier(.4, 0, .2, 1);
        }

        .custom-select:hover {
            background: #2c2c2e;
        }

        .custom-select:focus {
            border-color: rgba(255, 255, 255, .2);
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1c1c1e;
            padding: 14px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, .1);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
            transition: all .25s cubic-bezier(.4, 0, .2, 1);
        }

        .radio-label:hover {
            background: #2c2c2e;
        }

        .radio-label:has(input:checked) {
            background: #2c2c2e;
            border-color: rgba(255, 255, 255, .2);
        }

        .radio-label input[type="radio"] {
            accent-color: white;
        }
    </style>

</head>

<body>
    <h1>İnce Ayarlar</h1>

    <div id="menu">
        <div class="sidebar">
            <div class="sidebar-item active" data-tab="gorunum">Görünüm</div>
            <div class="sidebar-item" data-tab="ses">Ses</div>
            <div class="sidebar-item" data-tab="snapshot">Snapshot</div>
            <div class="sidebar-item" data-tab="yapay-zeke">Yapay Zeka</div>
        </div>

        <div class="content-area">
            
            <div id="gorunum" class="tab-content active">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Görünüm Ayarları</h3>
                <div class="setting-group">
                    <label class="setting-label">Tema Modu</label>
                    <select class="custom-select">
                        <option value="dark">Koyu Tema</option>
                        <option value="light">Açık Tema</option>
                    </select>
                </div>
            </div>

            <div id="ses" class="tab-content">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Ses Efektleri</h3>
                <div class="setting-group">
                    <label class="setting-label">Ses Çıkışı</label>
                    <select class="custom-select">
                        <option value="default">Varsayılan Hoparlör</option>
                        <option value="headphones">Kulaklık</option>
                    </select>
                </div>
            </div>

            <div id="snapshot" class="tab-content">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Snapshot Ayarları</h3>
                <div class="setting-group">
                    <label class="setting-label">Yedekleme Sıklığı</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="snapshot-freq" checked> Her Gün
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="snapshot-freq"> Her Hafta
                        </label>
                    </div>
                </div>
            </div>

            <div id="yapay-zeke" class="tab-content">
                <h3 style="margin-top: 0; margin-bottom: 20px;">Yapay Zeka Ayarları</h3>
                <div class="setting-group">
                    <label class="setting-label">Yetki</label>
                    <select class="custom-select">
                        <option value="max">Arayüz (Görsel)</option>
                        <option value="mid">Sadece Sohbet</option>
                        <option value="min">Kapalı</option>
                    </select>
                </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidebarItems = document.querySelectorAll('.sidebar-item');
            const tabContents = document.querySelectorAll('.tab-content');

            sidebarItems.forEach(item => {
                item.addEventListener('click', () => {
                    sidebarItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    tabContents.forEach(content => content.classList.remove('active'));

                    const targetTabId = item.getAttribute('data-tab');
                    const targetContent = document.getElementById(targetTabId);
                    if (targetContent) {
                        targetContent.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>

</html>
