<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Maestro</title>
    <link rel="stylesheet" href="style/style.css">
</head>

<body>
    <h1>Maestro'ya Hoşgeldiniz</h1>

    <div class="wrapper">
        <div id="try">
            <img src="icons/try.svg" alt="" width="60%">
            <span>Dene</span>
        </div>
        <div id="install" onclick="gecikmemoruk('install-ui/select1.html')">
            <img src="icons/drive-harddisk.svg" alt="" width="60%">
            <span>Kur</span>
        </div>
    </div>

<script>
        const tryBtn = document.getElementById('try');
        const installBtn = document.getElementById('install');

        function startAnimation() {
            document.body.classList.add('animate-out');
        }

        tryBtn.addEventListener('click', () => {
            startAnimation();
            
            const { ipcRenderer } = require('electron');
            
            setTimeout(() => {
                ipcRenderer.send('close-my-tuff-window');
            }, 1000);
        });

        installBtn.addEventListener('click', startAnimation);

        function gecikmemoruk(url) {
            document.getElementById('install').style.opacity = '0.5';
            document.getElementById('install').style.transform = 'scale(0.95)';

            setTimeout(function () {
                window.location.href = url;
            }, 1000);
        }
    </script>
</body>

</html>
