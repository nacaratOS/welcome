<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurulumunuzu Özelleştirelim</title>
    <link rel="stylesheet" href="../style/style.css">
    <style>
        #options {
            width: 85%;
            background: #252525;
            border-radius: 56px;
            border: 2px solid #333;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .preference-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 18px;
            width: 100%;
            cursor: pointer;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: #1f1f1f;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: #0072ec;
            border-color: #0072ec;
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 45%;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 3px 3px 0;
            transform: translate(-50%, -50%) rotate(45deg);
        }

        input[type="checkbox"]:hover {
            border-color: #0072ec;
            box-shadow: 0 0 8px rgba(0, 114, 236, 0.3);
        }

        input[type="checkbox"]+label {
            font-size: 18px;
            color: #fff !important;
            font-family: 'Arimo', sans-serif;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 20px;
            background: #1f1f1f;
            border: 2px solid #333;
            border-radius: 20px;
            color: #fff;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus-visible {
            outline: none;
            border-color: #0072ec;
        }

        #pricon {
            display: block;
            margin: 0 auto;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 5px;
        }

        .slider-header label {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
        }

        #perf-value {
            color: #4cd964;
            font-weight: 600;
            background: rgba(76, 217, 100, 0.1);
            padding: 2px 10px;
            border-radius: 10px;
        }

        .slider-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .slider-label {
            font-size: 12px;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
            font-weight: 650;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: #1f1f1f;
            border-radius: 10px;
            outline: none;
            border: 1px solid #333;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5), 0 0 2px rgba(0, 0, 0, 0.2);
            border: none;
            transition: transform 0.2s ease;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.1);
        }

        input[type="range"] {
            background: linear-gradient(to right, #4cd964 0%, #4cd964 var(--value), #1f1f1f var(--value), #1f1f1f 100%);
        }

        label {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
            font-weight: 650;
            color: #fff;
        }

        #body {
            transition: transform 0.6s ease, opacity 0.5s ease;
        }
    </style>
</head>

<body id="body">
    <script src="gecikmemoruk.js"></script>

    <h1>Kişiselleştirme</h1>
    <div id="options">
        <div class="icon-header">
            <img id="pricon" src="../icons/preferences-desktop-icons.svg" alt="" width="75px">
        </div>

        <div class="preference-container">
            <div class="checkbox-group">
                <input type="checkbox" id="unoserver">
                <label for="unoserver">Uno Paket Yöneticisi Sunucusunu Elle Ayarla</label>
            </div>

            <input type="text" id="unoserver-text" placeholder="Uno Sunucusu Adresi (Örn: 192.168.1.1)">
        </div>

        <div class="preference-container" style="margin-top: 10px;">
            <div class="slider-header">
                <label>Sistem Performansı</label>
                <span id="perf-value">100%</span>
            </div>

            <div class="slider-wrapper">
                <span class="slider-label left">Verimlilik</span>
                <input type="range" id="perf-slider" min="0" max="100" value="100" step="1">
                <span class="slider-label right">Performans</span>
            </div>
        </div>
    </div>

    <button id="continue-btn" onclick="gecikmemoruk('select5.html')">Devam Et</button>

    <script>
        const slider = document.getElementById('perf-slider');
        const valueLabel = document.getElementById('perf-value');

        function updateSlider() {
            const value = slider.value;
            valueLabel.textContent = value + '%';
            slider.style.setProperty('--value', value + '%');

            if (value < 30) {
                valueLabel.style.color = "#ff9500";
            } else {
                valueLabel.style.color = "#4cd964";
            }
        }

        const appleFont = '-apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif';

        document.querySelector('.slider-header label').style.fontFamily = appleFont;
        document.getElementById('perf-value').style.fontFamily = appleFont;
        document.querySelectorAll('.slider-label').forEach(el => el.style.fontFamily = appleFont);

        slider.addEventListener('input', updateSlider);
        updateSlider();
    </script>
</body>

</html>
