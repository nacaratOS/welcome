<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kişisel Bilgisayarınız Neredeyse Kullanıma Hazır</title>
    <link rel="stylesheet" href="../style/style.css">

    <style>
        #finished {
            width: 85%;
            max-width: 500px;
            background: #252525;
            border-radius: 40px;
            border: 2px solid #333;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto;
        }

        span {
            font-size: 18px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Arimo", sans-serif;
        }
    </style>
</head>

<body id="body"
    style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">

    <h1 style="color: white; font-family: sans-serif; margin-bottom: 30px;">Artık Hazırsınız!</h1>

    <div id="finished">
        <span>Tüm ayarlamalar tamamlandı! Artık kuruluma hazırsınız.</span>
    </div>

    <button id="continue-btn">Kur</button>

    <script src="gecikmemoruk.js"></script>

</body>

</html>
