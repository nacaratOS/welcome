<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurulumunuzu Özelleştirelim</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="../style/style.css">
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            margin: 0;
        }

        #locNclock {
            width: 85%;
            height: 340px;
            background: #252525;
            border-radius: 56px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #333;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }

        #locNclock:active {
            cursor: grabbing;
        }

        .country {
            fill: #444;
            stroke: #252525;
            stroke-width: 0.3;
            transition: fill 0.2s ease;
        }

        .country:hover {
            fill: #666;
            cursor: pointer;
        }

        .selected-country {
            fill: #ffffff !important;
            transition: all 0.2s ease;
        }

        #info {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1f1f1f;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #eee;
            border: 1px solid #333;
        }

        .controls-hint {
            position: absolute;
            bottom: 15px;
            right: 40px;
            font-size: 10px;
            color: #666;
            pointer-events: none;
        }

        #body {
            transition: transform 0.6s ease, opacity 0.5s ease;
        }
    </style>
</head>

<body id="body">

    <script src="gecikmemoruk.js"></script>

    <!-- <img id="localeicon" src="../icons/preferences-desktop-locale.svg" alt="" width="15%"> -->
    <h1>Bölge ve Saat Dilimi</h1>

    <div id="locNclock">
        <div class="controls-hint">Harita hareket ettirilebilir</div>
    </div>

    <div id="info">Bir bölge seçmek için haritaya tıklayın</div>

    <button id="continue-btn" onclick="gecikmemoruk('select4.html')">Devam Et</button>

    <script>
        const container = document.getElementById('locNclock');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const svg = d3.select("#locNclock")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", `0 0 ${width} ${height}`);

        const g = svg.append("g");

        const projection = d3.geoNaturalEarth1()
            .scale(width / 4.4)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        const zoom = d3.zoom()
            .scaleExtent([1, 8])
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        d3.json("https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson")
            .then(data => {
                g.selectAll("path")
                    .data(data.features)
                    .enter()
                    .append("path")
                    .attr("d", path)
                    .attr("class", "country")
                    .on("click", function (event, d) {
                        d3.selectAll(".country").classed("selected-country", false);
                        d3.select(this).classed("selected-country", true);
                        document.getElementById('info').innerText = "Seçilen Bölge: " + d.properties.name;
                    });
            })
            .catch(err => {
                container.innerHTML = "Veri yüklenemedi.";
                console.error(err);
            });

        svg.on("dblclick.zoom", () => {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        });
    </script>
</body>

</html>
